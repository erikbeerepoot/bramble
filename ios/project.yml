# XcodeGen project definition. Generate the .xcodeproj with:
#   brew install xcodegen && cd ios && xcodegen generate
# then open BrambleWidget.xcodeproj in Xcode, set your Development Team on both
# targets, and run. See README.md for the full setup (App Group, Keychain, Cloudflare).
name: BrambleWidget
options:
  bundleIdPrefix: ag.bramble
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Set DEVELOPMENT_TEAM here or in Xcode's Signing & Capabilities.
    DEVELOPMENT_TEAM: ""

targets:
  BrambleWidget:
    type: application
    platform: iOS
    sources:
      - path: BrambleWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ag.bramble.widget
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        CODE_SIGN_ENTITLEMENTS: BrambleWidget/BrambleWidget.entitlements
    dependencies:
      - target: BrambleWidgetExtension
        embed: true

  BrambleWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: BrambleWidgetExtension
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ag.bramble.widget.WidgetExtension
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: BrambleWidgetExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: BrambleWidgetExtension/BrambleWidgetExtension.entitlements
