services:
  api:
    image: ${API_IMAGE:-ghcr.io/erikbeerepoot/bramble/api:latest}
    container_name: bramble-api
    ports:
      - "5000:5000"
    devices:
      # Stable udev symlink for the hub UART (see 99-bramble-hub.rules); HUB_SERIAL
      # is set in .env. Defaults keep this working on a fresh checkout. Addressing
      # the raw ttyAMAn node instead is fragile — a kernel update renumbers it.
      - "${HUB_SERIAL:-/dev/bramble-hub}:${HUB_SERIAL:-/dev/bramble-hub}"
    volumes:
      - bramble-data:/data
    environment:
      - DEBUG=False
      - SERIAL_PORT=${HUB_SERIAL:-/dev/bramble-hub}
      - SERIAL_BAUD=115200
      - HOST=0.0.0.0
      - PORT=5000
      - SENSOR_DB_PATH=/data/sensor_data.duckdb
      - QUEUE_DB_PATH=/data/queue.db
      - DB_MEMORY_LIMIT=128MB
      - DB_THREADS=2
      # Bearer token required on mutating valve endpoints (iOS widget). Set in the
      # host environment / .env; empty disables enforcement.
      - API_TOKEN=${API_TOKEN:-}
    mem_limit: 128m
    restart: unless-stopped
    group_add:
      - dialout

  worker:
    image: ${API_IMAGE:-ghcr.io/erikbeerepoot/bramble/api:latest}
    container_name: bramble-worker
    command: uv run huey_consumer command_queue.huey -w 2 -k thread
    volumes:
      - bramble-data:/data
    environment:
      - DEBUG=False
      - SENSOR_DB_PATH=/data/sensor_data.duckdb
      - QUEUE_DB_PATH=/data/queue.db
      - DB_MEMORY_LIMIT=128MB
      - DB_THREADS=2
    mem_limit: 128m
    restart: unless-stopped
    depends_on:
      - api

  dashboard:
    image: ${DASHBOARD_IMAGE:-ghcr.io/erikbeerepoot/bramble/dashboard:latest}
    container_name: bramble-dashboard
    ports:
      - "3000:80"
    mem_limit: 64m
    restart: unless-stopped
    depends_on:
      - api

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.docker/config.json:/config.json:ro
    environment:
      - DOCKER_CONFIG=/
      # containrrr/watchtower's bundled Docker client defaults to API 1.25, which
      # the upgraded daemon rejects (min 1.44), silently stopping all auto-updates.
      # Pin a supported version so watchtower can talk to the daemon again.
      - DOCKER_API_VERSION=1.44
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300  # Check every 5 minutes
    restart: unless-stopped

volumes:
  bramble-data:
    name: bramble-data  # Explicit name prevents "api_" prefix
