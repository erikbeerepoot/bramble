server {
    listen 80;
    server_name _;

    # Use Docker's embedded DNS so the api upstream is re-resolved at runtime
    # instead of cached forever from container start. Without this, an api
    # container restart (e.g. via watchtower) strands nginx on a stale IP and
    # every /api/ request returns 502.
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for any route not matching a static file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Proxy API requests to the api service. The hostname is assigned to a
    # variable so nginx resolves it per-request via the resolver above.
    location /api/ {
        set $upstream_api api;
        proxy_pass http://$upstream_api:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
